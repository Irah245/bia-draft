<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Dearest Bia </title>
  <style>
    :root {
      --bg: #fff8f3;
      --text: #a33e4f;
      --muted: #756a64;
      --card: #ffffff;
    }
    * { box-sizing: border-box; }
  body, html {
  margin: 0;
  min-height: 100vh;
  overflow-y: auto;  /* Changed from 'hidden' to enable scrolling */
  overflow-x: hidden;
  font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
  background-color: #fffED3;
  color: #5a363d;
}
    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
      opacity: 0;
      visibility: hidden;
      transform: scale(1.02);
      transition: 0.35s ease;
    }
    .screen.active {
      opacity: 1;
      visibility: visible;
      transform: scale(1);
    }
    .heart-btn, .flower-btn, .arrow-btn {
      border: none;
      outline: none;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .heart-btn {
      font-size: 5rem;
      color: #c25d67;
      background: transparent;
      transform: translateY(0);
      animation: bounce 2s ease-in-out infinite;
    }
    .heart-btn:hover {
      transform: translateY(-8px) scale(1.1);
      text-shadow: 0 0 18px rgba(194,93,103,0.45);
    }
    .flower-btn {
      font-size: 4.2rem;
      background: rgba(255,255,255,0.6);
      border-radius: 1.3rem;
      padding: 0.8rem 1.5rem;
      color: #bd5c5a;
      margin-top: 1rem;
    }
    .flower-btn:hover {
      transform: translateY(-6px) rotate(-2deg) scale(1.04);
      box-shadow: 0 8px 16px rgba(0,0,0,0.14);
    }
    .arrow-btn {
      position: fixed;
      left: 1rem;
      bottom: 1rem;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: rgba(134, 133, 130, 0.73);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      border: 0;
      box-shadow: 0 4px 15px rgba(0,0,0,.25);
    }
    .arrow-btn:hover { transform: scale(1.06); }
    .flowers-grid {
      display: flex;
      flex-wrap: wrap;
      width: min(740px, 100%);
      justify-content: center;
      gap: 1rem;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.5s ease 0.15s, transform 0.5s ease 0.15s;
    }
    .flowers-grid.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .flower-item {
      width: 110px;
      height: 110px;
      border-radius: 1rem;
      background: linear-gradient(145deg, #ffd8d4 0%, #ffecf7 100%);
      display: grid;
      place-content: center;
      font-size: 2rem;
      border: 1px solid #e3c5d0;
      box-shadow: 0 8px 14px rgba(0,0,0,.08);
    }
    .flowers-text {
      margin-top: 1.4rem;
      color: #8d4f43;
      font-size: 1.3rem;
      max-width: 680px;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.45s ease 0.5s, transform 0.45s ease 0.5s;
    }
    .flowers-text.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .bouquet-btn {
      background: transparent;
      border: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
      padding: 0;
      color: #c16172;
      text-align: center;
    }
    .bouquet-btn:focus-visible {
      outline: 3px solid #f8b4c3;
      outline-offset: 6px;
    }
    .bouquet {
      width: 260px;
      height: 300px;
      position: relative;
      perspective: 900px;
      transform-style: preserve-3d;
      transform: translateY(0);
      transition: transform .3s ease;
      animation: bounce 3s ease-in-out infinite;
    }
    .bouquet-btn:hover .bouquet,
    .bouquet-btn:focus-visible .bouquet {
      transform: translateY(-10px) scale(1.05) rotateX(3deg);
    }
    .floral-group {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%) rotateX(12deg);
      width: 170px;
      height: 220px;
      perspective: 900px;
      transform-style: preserve-3d;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    .gerbera {
      position: relative;
      width: 140px;
      height: 240px;
      transform-style: preserve-3d;
      transform: translateZ(12px);
    }
    .gerbera-head {
      position: absolute;
      top: 0;
      left: 50%;
      width: 140px;
      height: 140px;
      transform: translateX(-50%);
      border-radius: 50%;
      background: 
        radial-gradient(circle at 50% 50%, transparent 0%, transparent 45%, rgba(0,0,0,0.08) 45%, rgba(0,0,0,0.08) 47%, transparent 47%),
        conic-gradient(from 0deg,
          #fffbf0 0deg 9deg,
          #f5eedc 9deg 12deg,
          #fffbf0 12deg 21deg,
          #ffffe0 21deg 27deg,
          #f0e8c8 27deg 30deg,
          #ffffe0 30deg 39deg,
          #fffbf0 39deg 45deg,
          #f5eedc 45deg 48deg,
          #fffbf0 48deg 57deg,
          #fffef5 57deg 63deg,
          #f0e8c8 63deg 66deg,
          #fffef5 66deg 75deg,
          #fffbf0 75deg 81deg,
          #f5eedc 81deg 84deg,
          #fffbf0 84deg 93deg,
          #ffffe0 93deg 99deg,
          #f0e8c8 99deg 102deg,
          #ffffe0 102deg 111deg,
          #fffbf0 111deg 117deg,
          #f5eedc 117deg 120deg,
          #fffbf0 120deg 129deg,
          #fffef5 129deg 135deg,
          #f0e8c8 135deg 138deg,
          #fffef5 138deg 147deg,
          #fffbf0 147deg 153deg,
          #f5eedc 153deg 156deg,
          #fffbf0 156deg 165deg,
          #ffffe0 165deg 171deg,
          #f0e8c8 171deg 174deg,
          #ffffe0 174deg 183deg,
          #fffbf0 183deg 189deg,
          #f5eedc 189deg 192deg,
          #fffbf0 192deg 201deg,
          #fffef5 201deg 207deg,
          #f0e8c8 207deg 210deg,
          #fffef5 210deg 219deg,
          #fffbf0 219deg 225deg,
          #f5eedc 225deg 228deg,
          #fffbf0 228deg 237deg,
          #ffffe0 237deg 243deg,
          #f0e8c8 243deg 246deg,
          #ffffe0 246deg 255deg,
          #fffbf0 255deg 261deg,
          #f5eedc 261deg 264deg,
          #fffbf0 264deg 273deg,
          #fffef5 273deg 279deg,
          #f0e8c8 279deg 282deg,
          #fffef5 282deg 291deg,
          #fffbf0 291deg 297deg,
          #f5eedc 297deg 300deg,
          #fffbf0 300deg 309deg,
          #ffffe0 309deg 315deg,
          #f0e8c8 315deg 318deg,
          #ffffe0 318deg 327deg,
          #fffbf0 327deg 333deg,
          #f5eedc 333deg 336deg,
          #fffbf0 336deg 345deg,
          #fffef5 345deg 351deg,
          #f0e8c8 351deg 354deg,
          #fffef5 354deg 360deg
        );
      box-shadow: 
        inset 0 -10px 20px rgba(0, 0, 0, 0.15),
        inset 0 8px 15px rgba(255, 255, 255, 0.5),
        0 12px 24px rgba(0, 0, 0, 0.25);
      filter: drop-shadow(0 6px 12px rgba(0, 0, 0, 0.15));
    }
    .gerbera-head::before {
      content: '';
      position: absolute;
      inset: 40px;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 40%, #ffd966 0%, #f4d140 40%, #d9a84a 100%);
      box-shadow: 
        inset 0 2px 6px rgba(0, 0, 0, 0.25),
        0 0 6px rgba(0, 0, 0, 0.1);
    }
    .gerbera-head::after {
      content: '';
      position: absolute;
      inset: 54px;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 50%, #c98547 0%, #8b5a3c 100%);
      box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.6);
    }
   
    .gerbera-stem {
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 12px;
      height: 100px;
      transform: translateX(-50%) rotate(2deg);
      background: linear-gradient(to right, #5a8c42 0%, #7db855 50%, #5a8c42 100%);
      border-radius: 6px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }
    .gerbera-leaf { display: none; }
    .flower, .center, .f1, .f2, .f3, .f4, .stem, .stem.two, .stem.three, .stem.four { display: none; }
    .bow {
      position: absolute;
      top: 219px;
      left: 50%;
      transform: translateX(-50%);
      width: 84px;
      height: 48px;
      background: radial-gradient(circle at 30% 30%, #ffd0dc 20%, #d86f88 80%);
      border-radius: 24px / 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.15);
    }
    .bow::before,
    .bow::after {
      content: '';
      position: absolute;
      top: 8px;
      width: 24px;
      height: 30px;
      border-radius: 50% 40% 53% 45%;
      background: linear-gradient(135deg, #f0a6b3 0%, #d65771 100%);
    }
    .bow::before { left: -14px; transform: rotate(-18deg); }
    .bow::after { right: -14px; transform: rotate(18deg); }
    .bouquet-text {
      font-family: 'Courier New', Courier, monospace;
      font-size: clamp(1.7rem, 5vw, 2.4rem);
      color: #c16172;
      margin: 0;
      animation: textGlow 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {
        transform: translateY(0) scale(1);
      }
      40% {
        transform: translateY(-15px) scale(1.05);
      }
      60% {
        transform: translateY(-8px) scale(1.02);
      }
    }
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes glow {
      0%, 100% {
        text-shadow: 0 0 5px rgba(201, 95, 105, 0.5);
      }
      50% {
        text-shadow: 0 0 20px rgba(201, 95, 105, 0.8), 0 0 30px rgba(201, 95, 105, 0.6);
      }
    }
    @keyframes textGlow {
      0%, 100% {
        text-shadow: 0 0 10px rgba(193, 97, 114, 0.5);
      }
      50% {
        text-shadow: 0 0 20px rgba(193, 97, 114, 0.8), 0 0 30px rgba(193, 97, 114, 0.6);
      }
    }
    .letter-card {
  width: min(840px, 95vw);
  max-width: 920px;
  background: #fff;
  border-radius: 24px;
  text-align: left;
  padding: 2rem 2.2rem;
  box-shadow: 0 12px 28px rgba(66,45,40,0.14);
  min-height: 360px;
  max-height: 85vh;  /* Add this */
  overflow-y: auto;   /* Add this */
  animation: fadeIn 1.5s ease-out;
  position: relative;
}
    .letter-title {
      font-size: clamp(1.5rem, 5vw, 2.6rem);
      color: #c95f69;
      margin-bottom: 1rem;
      text-align: center;
    }
    .letter-body {
      font-size: 1.2rem;
      line-height: 1.8;
      white-space: pre-wrap;
      min-height: 230px;
      color: #4f2f2f;
    }
    .signature {
      position: absolute;
      bottom: 2rem;
      right: 2.2rem;
      text-align: right;
      font-size: 1.2rem;
      line-height: 1.8;
      color: #4f2f2f;
      white-space: pre;
    }
    @media (max-width: 600px) {
      .heart-btn { font-size: 4.4rem; }
      .flower-btn { font-size: 3rem; }
      .letter-card { padding: 1.2rem; }
      .letter-title { font-size: 1.8rem; }
      .letter-body { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <section id="landing" class="screen active">
    <div style="display:flex; flex-direction:column; align-items:center; gap:1.6rem;">
      <button class="heart-btn" id="goToFlowers" aria-label="Go to flowers page" style="font-size:7rem;">❤</button>
      <h1 style="font-size:clamp(3.2rem, 9vw, 5.8rem); line-height:1.05; margin:0; color:#c66672;">My Dearest, Bia</h1>
    </div>
  </section>

  <section id="flowers" class="screen">
    <button id="flowerButton" class="bouquet-btn">
      <div class="bouquet">
        <div class="floral-group">
          <div class="gerbera">
            <div class="gerbera-head"></div>
            <div class="gerbera-core"></div>
            <div class="gerbera-stem"></div>
            <div class="gerbera-leaf gerbera-leaf-left"></div>
            <div class="gerbera-leaf gerbera-leaf-right"></div>
          </div>
        </div>
        <div class="bow"></div>
      </div>
      <span class="bouquet-text">Flowers for My Baby</span>
    </button>
  </section>

  <section id="letter" class="screen">
    <div class="letter-card">
      <h2 class="letter-title">To My Dearest, Bia</h2>
      <div class="letter-body" id="typewriterText"></div>
    </br>
    </br>
    </br>
    </br>

      <div class="signature" id="signature"></div>
    </div>
    <button class="arrow-btn" id="backHome" title="Back to first page">←</button>
  </section>

  <script>
    const landing = document.getElementById('landing');
    const flowers = document.getElementById('flowers');
    const letter = document.getElementById('letter');

    function showSection(section) {
      [landing, flowers, letter].forEach(s => s.classList.remove('active'));
      section.classList.add('active');
    }

    document.getElementById('goToFlowers').addEventListener('click', () => {
      showSection(flowers);
    });

    const flowerButton = document.getElementById('flowerButton');
    if (flowerButton) {
      flowerButton.addEventListener('click', () => {
        showSection(letter);
        runTypewriter();
      });
    }

    document.getElementById('backHome').addEventListener('click', () => {
      showSection(landing);
      resetTypewriter();
    });

    const mainContent = "Hi love, was it cliché if I made this kind of letter for you? I admit, I’m not good at words, so please bear with me.\n\nMy heart is full of you. I’ve never been this sure on someone till there was you. You are the quiet feeling that stays with me long after everything else fades, the reason my thoughts wander without warning and the reason my heart feels full in ways I don’t fully understand.\n\nNo matter how many times I try to put it into words, it never comes out the way it feels inside. It’s strange how someone can mean so much, yet feel impossible to describe.\n\nI hope I’m making you feel loved, in ways that doesn’t rush you, doesn’t overwhelm you, but stays through everything. I do hope the world is kind enough to let me keep something as precious as you.";
    const signatureContent = "always,\n-ebu";
    let typeIndex = 0;
    let typeTimeout;
    let typingSignature = false;

    function runTypewriter() {
      const target = document.getElementById('typewriterText');
      target.textContent = '';
      typeIndex = 0;
      typingSignature = false;
      typewriterStep();
    }

    function typewriterStep() {
      if (!typingSignature) {
        const target = document.getElementById('typewriterText');
        if (typeIndex <= mainContent.length) {
          target.textContent = mainContent.slice(0, typeIndex);
          typeIndex += 1;
          typeTimeout = setTimeout(typewriterStep, 25);
        } else {
          typingSignature = true;
          typeIndex = 0;
          typewriterStep();
        }
      } else {
        const sigTarget = document.getElementById('signature');
        if (typeIndex <= signatureContent.length) {
          sigTarget.textContent = signatureContent.slice(0, typeIndex);
          typeIndex += 1;
          typeTimeout = setTimeout(typewriterStep, 25);
        } else {
          clearTimeout(typeTimeout);
        }
      }
    }

    function resetTypewriter() {
      clearTimeout(typeTimeout);
      document.getElementById('typewriterText').textContent = '';
      document.getElementById('signature').textContent = '';
      typeIndex = 0;
      typingSignature = false;
    }

    showSection(landing);
  </script>
</body>
</html>
